version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: csa_platform
      POSTGRES_USER: csa
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U csa -d csa_platform" ]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_dev_data:/data

  backend:
    build: ./backend
    working_dir: /app
    command: sh -c "PYTHONPATH=/app alembic upgrade head && PYTHONPATH=/app uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://csa:devpass@postgres:5432/csa_platform
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=devsecret
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=30
      - SERIAL_SECRET=devserial
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=dev@csa.dev
      - SMTP_PASSWORD=devpass
      - SMTP_FROM_NAME=CSA Dev Platform
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=csa-reports
      - FRONTEND_URL=http://localhost:3000
      - API_URL=http://localhost:8000
      - TRACKING_BASE_URL=http://localhost:8000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - HIBP_API_URL=https://haveibeenpwned.com/api/v3/breachedaccount
      - HIBP_API_KEY=dummy_dev_key
      - SEED_ADMIN_EMAIL=admin@csa.dev
      - SEED_ADMIN_PASSWORD=admin1234
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./backend
    working_dir: /app
    command: sh -c "PYTHONPATH=/app celery -A app.workers.celery_app worker --loglevel=info"
    environment:
      - DATABASE_URL=postgresql+asyncpg://csa:devpass@postgres:5432/csa_platform
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=devsecret
      - SERIAL_SECRET=devserial
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=csa-reports
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=dev@csa.dev
      - SMTP_PASSWORD=devpass
      - SMTP_FROM_NAME=CSA Dev Platform
      - HIBP_API_KEY=dummy_dev_key
      - HIBP_API_URL=https://haveibeenpwned.com/api/v3/breachedaccount
      - FRONTEND_URL=http://localhost:3000
      - API_URL=http://localhost:8000
      - TRACKING_BASE_URL=http://localhost:8000
      - SEED_ADMIN_EMAIL=admin@csa.dev
      - SEED_ADMIN_PASSWORD=admin1234
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

volumes:
  postgres_dev_data:
  minio_dev_data:
