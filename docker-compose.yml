version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/dynamic_conf.yaml:/etc/traefik/dynamic_conf.yaml"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
    networks:
      - csa-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: csa_platform
      POSTGRES_USER: csa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csa -d csa_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csa-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csa-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    networks:
      - csa-net

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://csa:${DB_PASSWORD:-password}@postgres:5432/csa_platform
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=csa-reports
      - FRONTEND_URL=https://${DOMAIN}
      - API_URL=https://api.${DOMAIN}
      - TRACKING_BASE_URL=https://track.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # REST API Router
      - "traefik.http.routers.backend-api.rule=Host(`api.${DOMAIN}`) && !PathPrefix(`/socket.io/`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls=true"
      - "traefik.http.routers.backend-api.service=backend"
      
      # Socket.io Router with throttling
      - "traefik.http.routers.backend-socket.rule=Host(`api.${DOMAIN}`) && PathPrefix(`/socket.io/`)"
      - "traefik.http.routers.backend-socket.entrypoints=websecure"
      - "traefik.http.routers.backend-socket.tls=true"
      - "traefik.http.routers.backend-socket.service=backend"
      - "traefik.http.routers.backend-socket.middlewares=socket-throttle@file"

      - "traefik.http.routers.tracker.rule=Host(`track.${DOMAIN}`)"
      - "traefik.http.routers.tracker.entrypoints=websecure"
      - "traefik.http.routers.tracker.tls=true"
      - "traefik.http.routers.tracker.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - csa-net

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://csa:${DB_PASSWORD:-password}@postgres:5432/csa_platform
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - csa-net

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://${DOMAIN}/api/v1
        - NEXT_PUBLIC_SOCKET_URL=http://${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - csa-net


networks:
  csa-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
