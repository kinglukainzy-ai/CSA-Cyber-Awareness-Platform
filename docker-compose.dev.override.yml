services:
  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csa -d csa_platform"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    ports:
      - "8000:8000"
    command: sh -c "PYTHONPATH=/app alembic upgrade head && PYTHONPATH=/app python app/db/seeds.py && uvicorn app.main:socket_app --host 0.0.0.0 --port 8000"
    environment:
      - FRONTEND_URL=http://localhost:3000
      - DOMAIN=localhost
      - SEED_ADMIN_EMAIL=admin@csa.dev
      - SEED_ADMIN_PASSWORD=admin1234

  frontend:
    ports:
      - "3000:3000"
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:8000
